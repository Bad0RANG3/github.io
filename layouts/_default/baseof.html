<!DOCTYPE html>
<html lang="zh" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Title }} - Bad0RANG3's Blog</title>
  <meta name="description" content="{{ .Description }}">
  <link rel="icon" href="/ico.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            dark: { bg: '#0f0f1a', card: '#1a1a2e' }
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-[#f8fafc] dark:bg-[#0f0f1a] text-slate-800 dark:text-slate-200 min-h-screen font-sans">
  <nav class="sticky top-0 z-50 bg-white/80 dark:bg-[#1a1a2e]/80 backdrop-blur-md border-b border-slate-200/50 dark:border-slate-700/30">
    <div class="max-w-5xl mx-auto px-6">
      <div class="flex items-center justify-between h-16">
        <a href="/" class="text-xl font-bold bg-gradient-to-r from-blue-500 to-purple-500 bg-clip-text text-transparent">
          Bad0RANG3's Blog
        </a>
        <div class="flex items-center space-x-2">
          <a href="/" class="flex items-center space-x-2 px-4 py-2 rounded-xl transition-all duration-300 text-slate-600 dark:text-slate-300 hover:from-blue-500/10 hover:to-purple-500/10 hover:text-blue-500 dark:hover:text-purple-400 text-sm font-medium">
            <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            <span>首页</span>
          </a>
          <a href="/about" class="flex items-center space-x-2 px-4 py-2 rounded-xl transition-all duration-300 text-slate-600 dark:text-slate-300 hover:from-blue-500/10 hover:to-purple-500/10 hover:text-blue-500 dark:hover:text-purple-400 text-sm font-medium">
            <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            <span>关于</span>
          </a>
          <button id="theme-toggle" class="p-2 rounded-xl text-slate-600 dark:text-slate-300 hover:bg-gradient-to-r hover:from-blue-500/10 hover:to-purple-500/10 hover:text-blue-500 dark:hover:text-purple-400 transition-all duration-300">
            <svg id="sun-icon" class="w-[18px] h-[18px] hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
            <svg id="moon-icon" class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
          </button>
        </div>
      </div>
    </div>
  </nav>

  <main class="max-w-4xl mx-auto px-6 py-12">
    {{ block "main" . }}{{ end }}
  </main>

  <footer class="border-t border-slate-200/50 dark:border-slate-700/30 mt-16">
    <div class="max-w-5xl mx-auto px-6 py-8 text-center">
      <p class="text-sm text-slate-500 dark:text-slate-400">© 2026-NOW Bad0RANG3 With ❤️</p>
    </div>
  </footer>

  <script>
    const themeToggle = document.getElementById('theme-toggle');
    const sunIcon = document.getElementById('sun-icon');
    const moonIcon = document.getElementById('moon-icon');

    function updateThemeToggle() {
      const isDark = document.documentElement.classList.contains('dark');
      sunIcon?.classList.toggle('hidden', !isDark);
      moonIcon?.classList.toggle('hidden', isDark);
    }

    themeToggle?.addEventListener('click', () => {
      document.documentElement.classList.toggle('dark');
      updateThemeToggle();
    });

    updateThemeToggle();
  </script>
</body>
</html>
