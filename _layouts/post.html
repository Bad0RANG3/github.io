---
layout: default
title: ""
description: ""
---

<style>
  .post-content h1 { font-size: 2rem; font-weight: 700; color: #1e293b; margin-bottom: 1rem; }
  .post-content h2 { font-size: 1.5rem; font-weight: 600; color: #1e293b; margin-top: 2rem; margin-bottom: 1rem; }
  .post-content h3 { font-size: 1.25rem; font-weight: 600; color: #1e293b; margin-top: 1.5rem; margin-bottom: 0.75rem; }
  .dark .post-content h1, .dark .post-content h2, .dark .post-content h3 { color: #e2e8f0; }
  .post-content p { color: #475569; line-height: 1.8; margin-bottom: 1rem; }
  .dark .post-content p { color: #94a3b8; }
  .post-content a { color: #3b82f6; text-decoration: underline; }
  .post-content a:hover { color: #8b5cf6; }
  .post-content code { background: #f1f5f9; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; font-family: monospace; }
  .dark .post-content code { background: #334155; }
  .post-content pre { background: #1e293b; color: #e2e8f0; padding: 1rem; border-radius: 0.75rem; overflow-x: auto; margin: 1rem 0; }
  .post-content pre code { background: transparent; padding: 0; color: inherit; }
  .post-content ul, .post-content ol { padding-left: 1.5rem; margin-bottom: 1rem; }
  .post-content ul { list-style-type: disc; }
  .post-content ol { list-style-type: decimal; }
  .post-content li { margin-bottom: 0.5rem; color: #475569; }
  .dark .post-content li { color: #94a3b8; }
  .post-content blockquote { border-left: 4px solid #3b82f6; padding-left: 1rem; font-style: italic; color: #64748b; margin: 1rem 0; }
  .post-content hr { border-color: #e2e8f0; margin: 2rem 0; }
  .dark .post-content hr { border-color: #334155; }
  .post-content table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
  .post-content th, .post-content td { border: 1px solid #e2e8f0; padding: 0.5rem; }
  .dark .post-content th, .dark .post-content td { border-color: #334155; }
  .post-content strong { font-weight: 600; color: #1e293b; }
  .dark .post-content strong { color: #f1f5f9; }
  .post-content img { max-width: 100%; border-radius: 0.5rem; margin: 1rem 0; }
</style>

<article class="post-content">
  <h1 class="text-3xl font-bold text-slate-900 dark:text-white mb-4">{{ page.title }}</h1>
  <div class="text-slate-500 dark:text-slate-500 mb-8 text-sm">
    {{ page.date | date: "%Y-%m-%d" }}
  </div>
  {{ content }}
</article>
